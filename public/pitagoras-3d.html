<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Pitágoras 3D – a² + b² = c²</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0ea5e9;
        font-family: sans-serif;
      }
      .titulo {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 56px;
        background: #0f4956;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        z-index: 10;
      }
      a-scene {
        position: fixed;
        top: 56px;
        left: 0;
        width: 100vw;
        height: calc(100vh - 56px);
      }
    </style>
  </head>

  <body>
    <div class="titulo">Pitágoras 3D – a² + b² = c²</div>

    <a-scene embedded background="color: #dbeafe">
      <!-- Cámara -->
      <a-entity position="0 4 10">
        <a-camera></a-camera>
      </a-entity>

      <!-- Luces globales -->
      <a-entity light="type: ambient; intensity: 0.9"></a-entity>
      <a-entity light="type: directional; intensity: 0.9" position="3 6 4"></a-entity>

      <!-- Grupo principal -->
      <a-entity
        id="root"
        position="0 0 0"
        rotation="-40 40 0"
        scale="2 2 2"
        animation="property: rotation; to: -40 400 0; dur: 40000; easing: linear; loop: true"
      >
        <!-- Piso -->
        <a-plane rotation="-90 0 0" width="20" height="20" color="#e5e7eb"></a-plane>

        <!-- TRIÁNGULO RECTÁNGULO  A=(0,0,0), B=(3,0,0), C=(0,0,4) -->
        <a-triangle
          color="#cbd5e1"
          vertex-a="0 0 0"
          vertex-b="3 0 0"
          vertex-c="0 0 4"
        ></a-triangle>

        <!-- LADOS DEL TRIÁNGULO COMO SEGMENTOS -->
        <!-- a = 3 (rojo) de A a B -->
        <a-entity line="start: 0 0 0; end: 3 0 0; color: #ef4444"></a-entity>

        <!-- b = 4 (azul) de A a C -->
        <a-entity line="start: 0 0 0; end: 0 0 4; color: #1d4ed8"></a-entity>

        <!-- c = 5 (verde) HIPOTENUSA de B a C -->
        <a-entity line="start: 3 0 0; end: 0 0 4; color: #16a34a"></a-entity>

        <!-- ============================================= -->
        <!--  CUADRADOS ANIMADOS QUE SE ENSAMBLAN         -->
        <!-- ============================================= -->

        <!-- CUADRADO a² – ROJO OSCURO – VA AL LADO ROJO -->
        <a-plane
          id="sqA"
          color="#b91c1c"
          width="3"
          height="3"
          side="double"
          position="-6 4 -6"
          rotation="-50 0 20"
          animation__move="property: position; to: 1.5 0.01 -1.5; dur: 3000; delay: 800; easing: easeInOutQuad;"
          animation__rot="property: rotation; to: -90 0 0; dur: 3000; delay: 800; easing: easeInOutQuad;"
        ></a-plane>

        <!-- CUADRADO b² – AZUL OSCURO – VA AL LADO AZUL -->
        <a-plane
          id="sqB"
          color="#1d4ed8"
          width="4"
          height="4"
          side="double"
          position="6 5 -4"
          rotation="-30 30 -20"
          animation__move="property: position; to: -2 0.01 2; dur: 3000; delay: 1500; easing: easeInOutQuad;"
          animation__rot="property: rotation; to: -90 0 0; dur: 3000; delay: 1500; easing: easeInOutQuad;"
        ></a-plane>

        <!-- CUADRADO c² – VERDE OSCURO – ACOSTADO SOBRE LA HIPOTENUSA -->
        <a-plane
          id="sqC"
          color="#15803d"
          width="5"
          height="5"
          side="double"
          material="opacity: 0.75; transparent: true;"
          position="8 6 6"
          rotation="-30 -40 10"
          animation__move="
            property: position;
            to: 1.5 0.02 2;
            dur: 3500;
            delay: 2300;
            easing: easeInOutQuad;
          "
          <!-- gira mientras baja: 360° extra + ángulo de la hipotenusa -->
          animation__spin="
            property: rotation;
            to: -90 486.87 0;
            dur: 3500;
            delay: 2300;
            easing: easeInOutQuad;
          "
        ></a-plane>

        <!-- LUZ QUE RESALTA c² AL FINAL -->
        <a-entity
          id="sqCLight"
          light="type: point; intensity: 0; color: #bbf7d0; distance: 6"
          position="8 6 6"
          animation__move="property: position;
            to: 1.5 0.5 2;
            dur: 3500; delay: 2300; easing: easeInOutQuad;"
          animation__glow="property: light.intensity;
            to: 2; delay: 6000; dur: 800; easing: easeOutQuad;"
        ></a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
