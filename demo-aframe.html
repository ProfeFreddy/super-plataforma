<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>A-Frame Test</title>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
      a-scene { width: 100vw; height: 100vh; }
    </style>
  </head>

  <body>
    <a-scene background="color: #111">
      <a-box position="0 1 -4" color="#4CC3D9"></a-box>
      <a-sphere position="-1 1 -4" radius="0.5" color="#EF2D5E"></a-sphere>
      <a-plane rotation="-90 0 0" width="6" height="6" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
